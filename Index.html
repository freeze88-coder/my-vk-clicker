<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VK Clicker — Престиж</title>
    <script src="https://unpkg.com/@vkontakte/vk-bridge/dist/browser.min.js"></script>
    <style>
        :root { --bg-color: #edeef0; --text-color: #2c3e50; --card-bg: #ffffff; --accent-color: #4a76a8; }
        body.dark-mode { --bg-color: #19191a; --text-color: #e1e3e6; --card-bg: #222223; --accent-color: #71aaeb; }
        body {
            background-color: var(--bg-color); color: var(--text-color);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; margin: 0; font-family: -apple-system, sans-serif;
            overflow: hidden; touch-action: none; -webkit-user-select: none;
        }
        /* Лоадер (экран загрузки) */
        #app-loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 10000;
            transition: opacity 0.5s ease;
        }
        .spinner {
            width: 48px;
            height: 48px;
            border: 5px solid var(--accent-color);
            border-bottom-color: transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .loader-text { margin-top: 15px; color: var(--text-color); font-size: 16px; }
        
        /* Основной контент изначально невидим */
        .main-content {
            visibility: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
        }
        
        .score-container { font-size: 36px; font-weight: bold; margin-bottom: 5px; }
        #levelDisplay { font-size: 18px; opacity: 0.8; margin-bottom: 5px; }
        #prestigeInfo { font-size: 14px; opacity: 0.7; margin-bottom: 15px; }
        #clickBtn {
            width: 180px; height: 180px; border-radius: 50%;
            background: linear-gradient(135deg, var(--accent-color), #3b5d85);
            border: 6px solid #fff; box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            display: flex; align-items: center; justify-content: center; font-size: 70px;
            transition: transform 0.05s; z-index: 10; -webkit-tap-highlight-color: transparent;
        }
        #clickBtn:active { transform: scale(0.92); }
        .ui-group { display: flex; flex-direction: column; gap: 8px; margin-top: 20px; width: 260px; }
        .upgrade-btn {
            background: var(--card-bg); color: var(--text-color); border: 1px solid rgba(0,0,0,0.1);
            padding: 12px; border-radius: 12px; font-weight: 600; cursor: pointer; text-align: center;
        }
        .upgrade-btn:disabled { opacity: 0.5; }
        .energy-bar-bg { width: 100%; height: 10px; background: #dce1e6; border-radius: 5px; margin-top: 5px; overflow: hidden; }
        #energyBarFill { height: 100%; width: 100%; background: var(--accent-color); transition: width 0.3s; }
        .floating-text { position: fixed; font-weight: bold; pointer-events: none; animation: moveUp 0.8s forwards; z-index: 100; }
        @keyframes moveUp { 0% { transform: translateY(0); opacity: 1; } 100% { transform: translateY(-100px); opacity: 0; } }
        .particle { position: fixed; width: 6px; height: 6px; border-radius: 50%; animation: explode 0.6s forwards; z-index: 99; }
        @keyframes explode { 100% { transform: translate(var(--dx), var(--dy)); opacity: 0; } }
        #themeToggle { position: absolute; top: 20px; right: 20px; font-size: 24px; cursor: pointer; }
        .modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.8); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: var(--card-bg); padding: 30px; border-radius: 20px; text-align: center; width: 80%; max-width: 300px; }
    </style>
</head>
<body>

    <!-- Лоадер (видим всегда до инициализации) -->
    <div id="app-loader">
        <div class="spinner"></div>
        <div class="loader-text">Загрузка приложения...</div>
    </div>

    <!-- Основной контент -->
    <div class="main-content">
        <div id="themeToggle">🌓</div>
        <div class="score-container">💰 <span id="score">0</span></div>
        <div id="levelDisplay">Уровень: 1</div>
        <div id="prestigeInfo">✨ Престижей: <span id="prestigeCount">0</span> | Множитель: ×<span id="multiplierDisplay">1.00</span></div>
        
        <div style="width: 200px; text-align: center;">
            ⚡ <span id="energyValue">100</span>/100
            <div class="energy-bar-bg"><div id="energyBarFill"></div></div>
        </div>

        <div id="clickBtn">🪙</div>

        <div class="ui-group">
            <button class="upgrade-btn" id="buyAutoClicker">🤖 Автокликер (+1/с) <br> <small>Цена: <span id="autoPrice">15</span></small></button>
            <button class="upgrade-btn" id="prestigeBtn" style="background: linear-gradient(135deg, #ffd700, #b8860b); color:#2c3e50;">🌟 ПРЕСТИЖ</button>
            <button class="upgrade-btn" id="leaderboardBtn">🏆 Лидеры</button>
            <button class="upgrade-btn" id="shareBtn">📢 Поделиться</button>
            <button class="upgrade-btn" id="adBtn" style="background:#27ae60; color:#fff; border:none;">📺 +50 Энергии</button>
        </div>
    </div>

    <!-- Модальные окна -->
    <div id="bonusModal" class="modal"><div class="modal-content"><h2>🎁 Бонус!</h2><p id="bonusText"></p><button class="upgrade-btn" onclick="window.closeModal('bonusModal')">ОК</button></div></div>
    <div id="offlineModal" class="modal"><div class="modal-content"><h2>🌙 С возвращением!</h2><p id="offlineText"></p><button class="upgrade-btn" onclick="window.closeModal('offlineModal')">Забрать</button></div></div>
    <div id="levelUpMsg" style="display:none; position:fixed; font-size:40px; color:#ffc107; font-weight:bold; z-index:200;">LEVEL UP!</div>
    <div id="prestigeModal" class="modal"><div class="modal-content"><h2>🌟 ПРЕСТИЖ</h2><p id="prestigeModalText"></p><button class="upgrade-btn" id="confirmPrestigeBtn">ДА, СБРОСИТЬ ВСЁ</button><button class="upgrade-btn" id="cancelPrestigeBtn" style="margin-top:10px;">ОТМЕНА</button></div></div>

<script>
    // ---------------------------- ИГРОВЫЕ ДАННЫЕ ----------------------------
    let score = parseInt(localStorage.getItem('score')) || 0;
    let energy = parseInt(localStorage.getItem('energy')) || 100;
    let level = parseInt(localStorage.getItem('level')) || 1;
    let autoClickers = parseInt(localStorage.getItem('autoClickers')) || 0;
    let prestigeLevel = parseInt(localStorage.getItem('prestigeLevel')) || 0;
    const maxEnergy = 100;
    
    function getIncomeMultiplier() {
        return 1 + prestigeLevel * 0.3;
    }
    
    function getAutoPrice() {
        return Math.round(15 * Math.pow(1.5, autoClickers));
    }
    let autoPrice = getAutoPrice();

    function getRequiredPrestigeLevel() {
        return 30 + prestigeLevel * 5;
    }
    
    // DOM элементы
    const scoreEl = document.getElementById('score');
    const energyEl = document.getElementById('energyValue');
    const levelEl = document.getElementById('levelDisplay');
    const autoPriceEl = document.getElementById('autoPrice');
    const btn = document.getElementById('clickBtn');
    const prestigeCountSpan = document.getElementById('prestigeCount');
    const multiplierDisplaySpan = document.getElementById('multiplierDisplay');
    const prestigeBtn = document.getElementById('prestigeBtn');
    
    // ---------------------------- ИГРОВЫЕ ФУНКЦИИ ----------------------------
    function updatePrestigeUI() {
        prestigeCountSpan.innerText = prestigeLevel;
        multiplierDisplaySpan.innerText = getIncomeMultiplier().toFixed(2);
        const required = getRequiredPrestigeLevel();
        if (level >= required) {
            prestigeBtn.disabled = false;
            prestigeBtn.innerText = `🌟 ПРЕСТИЖ (доступно с ур.${required}) | ×${getIncomeMultiplier().toFixed(2)} → ×${(getIncomeMultiplier() + 0.3).toFixed(2)}`;
        } else {
            prestigeBtn.disabled = true;
            prestigeBtn.innerText = `🌟 ПРЕСТИЖ (нужен ур.${required})`;
        }
    }
    
    function getRequiredXP(lvl) {
        return lvl * (lvl + 1) * 25;
    }
    
    function checkAndApplyLevelUp() {
        let leveled = false;
        while (score >= getRequiredXP(level)) {
            level++;
            energy = maxEnergy;
            leveled = true;
            showLevelUp();
        }
        if (leveled) {
            updateDisplay();
            updatePrestigeUI();
        }
    }
    
    function updateDisplay() {
        scoreEl.innerText = Math.floor(score);
        energyEl.innerText = Math.floor(energy);
        levelEl.innerText = `Уровень: ${level}`;
        autoPrice = getAutoPrice();
        autoPriceEl.innerText = autoPrice;
        document.getElementById('energyBarFill').style.width = (energy / maxEnergy * 100) + '%';
        document.getElementById('buyAutoClicker').disabled = score < autoPrice;
        updatePrestigeUI();
        
        localStorage.setItem('score', score);
        localStorage.setItem('energy', energy);
        localStorage.setItem('level', level);
        localStorage.setItem('autoClickers', autoClickers);
        localStorage.setItem('prestigeLevel', prestigeLevel);
    }
    
    function handleAction(e) {
        if (energy >= 1) {
            let gain = 1 * getIncomeMultiplier();
            score += gain;
            energy--;
            let x, y;
            if (e.clientX) { x = e.clientX; y = e.clientY; }
            else if (e.touches && e.touches[0]) { x = e.touches[0].clientX; y = e.touches[0].clientY; }
            else { const rect = btn.getBoundingClientRect(); x = rect.left + rect.width/2; y = rect.top + rect.height/2; }
            createFloatingText(x, y, `+${gain.toFixed(1)}`);
            createParticles(x, y);
            checkAndApplyLevelUp();
            updateDisplay();
            if (typeof vkBridge !== 'undefined') {
                vkBridge.send("VKWebAppTapticImpactOccurred", {"style": "light"}).catch(()=>{});
            }
        } else {
            const rect = btn.getBoundingClientRect();
            createFloatingText(rect.left + rect.width/2, rect.top + rect.height/2, "⚠️ Нет энергии", "#e67e22");
        }
    }
    
    function showLevelUp() {
        const msg = document.getElementById('levelUpMsg');
        msg.style.display = 'block';
        msg.style.left = '50%'; msg.style.top = '50%';
        msg.style.transform = 'translate(-50%, -50%)';
        setTimeout(() => msg.style.display = 'none', 1500);
    }
    
    // Эффекты
    function createFloatingText(x, y, text, customColor = null) {
        const el = document.createElement("div");
        el.className = "floating-text";
        el.innerText = text;
        el.style.left = `${x}px`;
        el.style.top = `${y}px`;
        el.style.color = customColor || (document.body.classList.contains('dark-mode') ? '#71aaeb' : '#4a76a8');
        document.body.appendChild(el);
        setTimeout(() => el.remove(), 800);
    }
    
    function createParticles(x, y) {
        for (let i = 0; i < 6; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            p.style.backgroundColor = '#4a76a8';
            p.style.left = x + 'px';
            p.style.top = y + 'px';
            p.style.setProperty('--dx', (Math.random() - 0.5) * 120 + 'px');
            p.style.setProperty('--dy', (Math.random() - 0.5) * 120 + 'px');
            document.body.appendChild(p);
            setTimeout(() => p.remove(), 600);
        }
    }
    
    // Престиж
    function performPrestige() {
        const requiredLvl = getRequiredPrestigeLevel();
        if (level < requiredLvl) return;
        score = 0;
        level = 1;
        autoClickers = 0;
        energy = maxEnergy;
        prestigeLevel++;
        autoPrice = getAutoPrice();
        updateDisplay();
        updatePrestigeUI();
        createFloatingText(window.innerWidth/2, window.innerHeight/2, `✨ ПРЕСТИЖ ${prestigeLevel}!\nМножитель ×${getIncomeMultiplier().toFixed(2)}`, "#ffd700");
        localStorage.setItem('prestigeLevel', prestigeLevel);
        closeModal('prestigeModal');
    }
    
    // Обработчики кнопок
    btn.addEventListener('touchstart', (e) => { e.preventDefault(); handleAction(e); }, { passive: false });
    btn.addEventListener('click', (e) => { if (e.pointerType !== 'touch') handleAction(e); });
    
    document.getElementById('buyAutoClicker').onclick = () => {
        if (score >= autoPrice) {
            score -= autoPrice;
            autoClickers++;
            autoPrice = getAutoPrice();
            updateDisplay();
        }
    };
    
    setInterval(() => {
        if (autoClickers > 0) {
            let autoGain = autoClickers * getIncomeMultiplier();
            score += autoGain;
            checkAndApplyLevelUp();
            updateDisplay();
        }
    }, 1000);
    
    setInterval(() => {
        if (energy < maxEnergy) { energy++; updateDisplay(); }
    }, 2500);
    
    // Модалка престижа
    const prestigeModal = document.getElementById('prestigeModal');
    prestigeBtn.onclick = () => {
        if (level >= getRequiredPrestigeLevel()) {
            document.getElementById('prestigeModalText').innerHTML = `Сбросите прогресс до уровня 1, обнулите автокликеры и очки.<br><strong>НО</strong> получите <strong style="color:gold;">+30%</strong> к доходу навсегда!<br>Текущий множитель: ×${getIncomeMultiplier().toFixed(2)} → ×${(getIncomeMultiplier()+0.3).toFixed(2)}<br>Уровень престижа станет ${prestigeLevel+1}.`;
            prestigeModal.style.display = 'flex';
        }
    };
    document.getElementById('confirmPrestigeBtn').onclick = () => performPrestige();
    document.getElementById('cancelPrestigeBtn').onclick = () => closeModal('prestigeModal');
    
    // VK и другие кнопки
    document.getElementById('leaderboardBtn').onclick = () => {
        if (typeof vkBridge !== 'undefined') vkBridge.send("VKWebAppShowLeaderBoardBox", {user_result: Math.floor(score)}).catch(()=>{});
        else alert("Доступно только в VK Mini App");
    };
    document.getElementById('shareBtn').onclick = () => {
        if (typeof vkBridge !== 'undefined') vkBridge.send("VKWebAppShowWallPostBox", {message: `Мой счёт: ${Math.floor(score)}! Множитель x${getIncomeMultiplier().toFixed(2)}`}).catch(()=>{});
        else alert("Доступно только в VK Mini App");
    };
    document.getElementById('adBtn').onclick = () => {
        if (typeof vkBridge !== 'undefined') {
            vkBridge.send("VKWebAppShowNativeAds", {ad_format: "reward"}).then(data => { if(data.result) { energy = Math.min(maxEnergy, energy + 50); updateDisplay(); } }).catch(()=>{});
        } else alert("Реклама доступна только в VK Mini App");
    };
    
    // Тёмная тема
    document.getElementById('themeToggle').onclick = () => {
        document.body.classList.toggle('dark-mode');
        localStorage.setItem('dark', document.body.classList.contains('dark-mode'));
    };
    window.closeModal = function(id) { document.getElementById(id).style.display = 'none'; };
    
    // ---------------------------- ОФФЛАЙН И ЕЖЕДНЕВНЫЙ БОНУС ----------------------------
    function loadOfflineBonus() {
        const lastSeen = localStorage.getItem('lastSeen');
        if (lastSeen && autoClickers > 0) {
            const offSec = Math.min(Math.floor((Date.now() - parseInt(lastSeen)) / 1000), 14400);
            const inc = offSec * autoClickers * getIncomeMultiplier();
            if (inc > 0) {
                score += inc;
                checkAndApplyLevelUp();
                updateDisplay();
                document.getElementById('offlineText').innerText = `Доход за ${Math.floor(offSec/60)} мин: ${Math.floor(inc)} 💰 (x${getIncomeMultiplier().toFixed(2)})`;
                document.getElementById('offlineModal').style.display = 'flex';
            }
        }
        const today = new Date().toDateString();
        if (localStorage.getItem('lastBonus') !== today) {
            score += 500;
            checkAndApplyLevelUp();
            updateDisplay();
            document.getElementById('bonusText').innerText = "+500 за вход сегодня!";
            document.getElementById('bonusModal').style.display = "flex";
            localStorage.setItem('lastBonus', today);
        }
        updateDisplay();
        updatePrestigeUI();
    }
    
    // ---------------------------- ИНИЦИАЛИЗАЦИЯ VK BRIDGE ----------------------------
    const appLoader = document.getElementById('app-loader');
    const mainContent = document.querySelector('.main-content');
    
    function hideLoaderAndShowApp() {
        if (appLoader) {
            appLoader.style.opacity = '0';
            setTimeout(() => {
                if (appLoader) appLoader.style.display = 'none';
            }, 500);
        }
        if (mainContent) mainContent.style.visibility = 'visible';
        loadOfflineBonus();
    }
    
    function showErrorScreen(message) {
        if (appLoader) {
            appLoader.innerHTML = `<div style="text-align:center; padding:20px;">
                <h2>⚠️ Ошибка загрузки</h2>
                <p style="color: #e74c3c;">${message}</p>
                <button onclick="window.location.reload();" style="margin-top:20px; padding:10px 20px; background:var(--accent-color); border:none; border-radius:8px; color:white;">Обновить страницу</button>
            </div>`;
        } else {
            alert(`Ошибка загрузки: ${message}`);
        }
    }
    
    async function initVK() {
        if (typeof vkBridge === 'undefined') {
            console.warn("VK Bridge не загружен");
            if (window.self === window.top && !window.location.search.includes('vk_access_token')) {
                console.log("Демо-режим: запуск вне VK");
                hideLoaderAndShowApp();
            } else {
                showErrorScreen("Не удалось загрузить VK Bridge. Перезагрузите приложение.");
            }
            return;
        }
        
        try {
            await vkBridge.ready();
            console.log("VK Bridge готов");
            await vkBridge.send("VKWebAppInit");
            console.log("VKWebAppInit отправлен");
            if (vkBridge.supports('VKWebAppLoadingCompleted')) {
                await vkBridge.send("VKWebAppLoadingCompleted", {});
                console.log("VKWebAppLoadingCompleted отправлен");
            } else {
                console.warn("VKWebAppLoadingCompleted не поддерживается");
            }
            hideLoaderAndShowApp();
        } catch (error) {
            console.error("Ошибка инициализации:", error);
            showErrorScreen(`Ошибка: ${error.message || error}. Перезагрузите.`);
        }
    }
    
    // Сохранение времени выхода
    window.addEventListener('beforeunload', () => {
        localStorage.setItem('lastSeen', Date.now());
    });
    if (!localStorage.getItem('lastSeen')) localStorage.setItem('lastSeen', Date.now());
    
    // Восстановление темы
    if (localStorage.getItem('dark') === 'true') document.body.classList.add('dark-mode');
    
    // Старт
    window.addEventListener('load', () => {
        initVK();
    });
</script>
</body>
</html>
